<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="login-wrap">
  <div class="login-box">
    <div class="login-title">Task Manager</div>
    <div class="login-sub">Sign in to continue</div>

    <div class="alert alert-error" id="error-msg"></div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
    </div>

    <button class="btn btn-primary btn-full" id="login-btn" onclick="login()">
      Sign In
    </button>
  </div>
</div>

<script>
  const API = 'http://127.0.0.1:8000';

  // If already logged in, redirect immediately
  const token = localStorage.getItem('token');
  if (token) {
    const isAdmin = localStorage.getItem('is_admin') === 'true';
    window.location.href = isAdmin ? 'admin.html' : 'user.html';
  }

  // Allow pressing Enter to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideError() {
    document.getElementById('error-msg').classList.remove('visible');
  }

  async function login() {
    hideError();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      showError('Please fill in both fields.');
      return;
    }

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    // The login endpoint expects form data, not JSON
    // This matches OAuth2PasswordRequestForm on the backend
    const formData = new URLSearchParams();
    formData.append('username', username);
    formData.append('password', password);

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData
      });

      if (!res.ok) {
        const data = await res.json();
        showError(data.detail || 'Invalid credentials.');
        return;
      }

      const data = await res.json();

      // Decode the JWT payload to get is_admin
      // JWT is three Base64 parts separated by dots — the middle part is the payload
      const payload = JSON.parse(atob(data.access_token.split('.')[1]));

      // Store token and role in localStorage so all pages can use them
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('is_admin', payload.is_admin);
      localStorage.setItem('username', username);

      // Redirect based on role
      window.location.href = payload.is_admin ? 'admin.html' : 'user.html';

    } catch (err) {
      showError('Could not connect to server. Make sure the API is running.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }
</script>

</body>
</html>
